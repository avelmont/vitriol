[tools]
go = "1.26"
gofumpt = "latest"
golangci-lint = "2.11"
lefthook = "2.1"
lychee = "0.23"
node = "lts"
typos = "1.45"

[tasks.setup]
description = "Setup the project"
run = '''
go mod tidy
lefthook install
'''

[tasks."build:crucible"]
description = "Builds Crucible binary"
run = 'go build -o bin/crucible ./cmd/crucible'

[tasks."build:lapis"]
description = "Builds Lapis binary"
run = 'go build -o bin/lapis ./cmd/lapis'

[tasks."build:clean"]
description = "Cleans the binary directory"
run = 'rm -r ./bin'
